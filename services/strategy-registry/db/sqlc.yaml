version: "2"

sql:
  - engine: "postgresql"
    schema:
      - "gen/schema.sql"
    queries:
      - "../internal/adapters/postgres/sqlc/gen/queries"
    gen:
      go:
        package: "strategyregistrydbsqlc"
        out: "../internal/adapters/postgres/sqlc/gen"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "numeric"
            go_type: "string"
          - db_type: "timestamptz"
            go_type: "time.Time"
