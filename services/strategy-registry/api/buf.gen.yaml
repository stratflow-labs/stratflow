version: v1
plugins:
  - plugin: go
    out: ../gen/go
    opt:
      - paths=source_relative
  - plugin: connect-go
    out: ../gen/go
    opt:
      - paths=source_relative
  - plugin: go-grpc
    out: ../gen/go
    opt:
      - paths=source_relative
  - plugin: grpc-gateway
    out: ../gen/go
    opt:
      - paths=source_relative
  - plugin: openapiv2
    out: ../gen/openapi
    strategy: all
    opt:
      - allow_merge=true
      - merge_file_name=strategy-registry
