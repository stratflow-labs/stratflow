rules:
  - method: GET
    path: /api/users
    permission: identity:users:list

  - method: POST
    path: /api/users
    permission: identity:users:create

  - method: GET
    path: /api/users/me
    permission: identity:users:get
    owner:
      source: context
      name: userId

  - method: PUT
    path: /api/users/me
    permission: identity:users:update
    owner:
      source: context
      name: userId

  - method: DELETE
    path: /api/users/me
    permission: identity:users:delete
    owner:
      source: context
      name: userId

  - method: GET
    path: /api/users/{userId}
    permission: identity:users:get
    owner:
      source: path
      name: userId

  - method: PUT
    path: /api/users/{userId}
    permission: identity:users:update
    owner:
      source: path
      name: userId

  - method: DELETE
    path: /api/users/{userId}
    permission: identity:users:delete

  - method: POST
    path: /api/auth/logout
    permission: identity:session:logout
    owner:
      source: context
      name: userId

  - method: POST
    path: /connect/stratflow.identity.v1.IdentityService/Logout
    permission: identity:session:logout
    owner:
      source: context
      name: userId

  - method: POST
    path: /api/auth/refresh
    permission: identity:session:refresh
    owner:
      source: context
      name: userId

  - method: GET
    path: /api/strategies
