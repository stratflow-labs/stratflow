x-common-env: &common-env
  APP_ENV: ${APP_ENV:-dev}
  LOG_FORMAT: ${LOG_FORMAT:-console}
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  LOG_COLOR: ${LOG_COLOR:-true}

x-go-env: &go-env
  <<: *common-env
  DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASS:-change-me-postgres-password}@postgres:5432/${DB_NAME:-stratflow}

x-identity-env: &identity-env
  <<: *go-env
  HTTP_PORT: 8888
  GRPC_PORT: 9090

x-strategy-registry-env: &strategy-registry-env
  <<: *go-env
  HTTP_PORT: 8888
  GRPC_PORT: 9091
  IDENTITY_URL: ${IDENTITY_URL:-http://identity:8888/api}
  IDENTITY_GRPC_URL: ${IDENTITY_GRPC_URL:-identity:9090}
  TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET:?TOKEN_HASH_SECRET is required}
  MASTER_SESSION_TOKEN: ${MASTER_SESSION_TOKEN:?MASTER_SESSION_TOKEN is required}

x-go-build: &go-build
  context: .
  dockerfile: ./deploy/docker/Dockerfile
  target: dev

services:
  postgres:
    hostname: postgres
    container_name: ${APP_NAME:-stratflow}-db
    image: postgres:17-alpine
    ports: []
    volumes:
      - app-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-change-me-postgres-password}
      POSTGRES_DB: ${DB_NAME:-stratflow}
    networks:
      - app-network

  identity:
    build: *go-build
    container_name: ${APP_NAME:-stratflow}-identity
    volumes:
      - .:/app
    command: air -c deploy/docker/air/identity.toml
    depends_on:
      - postgres
    ports: []
    environment:
      <<: *identity-env
    networks:
      - app-network

  strategy-registry:
    build: *go-build
    container_name: ${APP_NAME:-stratflow}-strategy-registry
    volumes:
      - .:/app
    command: air -c deploy/docker/air/strategy-registry.toml
    depends_on:
      - postgres
      - identity
    ports: []
    environment:
      <<: *strategy-registry-env
    networks:
      - app-network

  front:
    build:
      context: .
      dockerfile: ./deploy/front/Dockerfile
      target: dev
    container_name: ${APP_NAME:-stratflow}-front
    working_dir: /app/apps/web
    command: ["npx", "next", "dev", "-H", "0.0.0.0", "-p", "3000"]
    volumes:
      - .:/app
      - front-node-modules:/app/node_modules
      - front-next-cache:/app/apps/web/.next
    ports: []
    environment:
      <<: *common-env
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8085/api}
    networks:
      - app-network

  nginx:
    image: nginx:1.25-alpine
    container_name: ${APP_NAME:-stratflow}-nginx
    depends_on:
      - identity
      - strategy-registry
    ports:
      - "${API_GATEWAY_PORT_HOST:-8085}:80"
    environment:
      NGINX_PROXY_INTERCEPT_ERRORS: ${NGINX_PROXY_INTERCEPT_ERRORS:-on}
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

volumes:
  app-data:
  front-node-modules:
  front-next-cache:

networks:
  app-network:
    driver: bridge
