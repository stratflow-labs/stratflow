version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - govet
    - staticcheck
    - revive
    - ineffassign
    - misspell
    - bodyclose
    - errorlint
    - errcheck
    - unused
    - nilerr
    - nilnil
    - noctx
    - unconvert
    - wastedassign
    - whitespace
    - copyloopvar
    - exhaustive
    - sqlclosecheck
    - rowserrcheck
    - containedctx
    - contextcheck
    - nilnesserr
    - gocognit
    - dupl

  exclusions:
    paths:
      - '(^|/)node_modules(/|$)'
      - '(^|/)apps/web/node_modules(/|$)'

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: blank-imports
          disabled: true
        - name: context-as-argument
        - name: context-keys-type
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: import-shadowing
        - name: increment-decrement
        - name: receiver-naming
        - name: redefines-builtin-id

formatters:
  enable:
    - gofmt

output:
  formats:
    code-climate:
      path: golangci-lint-report.json
