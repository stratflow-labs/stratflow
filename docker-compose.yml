x-common-env: &common-env
  APP_ENV: ${APP_ENV:-prod}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_COLOR: ${LOG_COLOR:-false}

x-go-env: &go-env
  <<: *common-env
  DB_URL: postgresql://${DB_USER:-postgres}:${DB_PASS:-change-me-postgres-password}@postgres:5432/${DB_NAME:-stratflow}

x-identity-env: &identity-env
  <<: *go-env
  HTTP_PORT: 8888
  GRPC_PORT: 9090
  TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET:?TOKEN_HASH_SECRET is required}
  MASTER_SESSION_TOKEN: ${MASTER_SESSION_TOKEN:?MASTER_SESSION_TOKEN is required}

x-strategy-registry-env: &strategy-registry-env
  <<: *go-env
  HTTP_PORT: 8888
  GRPC_PORT: 9091
  IDENTITY_URL: ${IDENTITY_URL:-http://identity:8888/api}
  IDENTITY_GRPC_URL: ${IDENTITY_GRPC_URL:-identity:9090}
  MASTER_SESSION_TOKEN: ${MASTER_SESSION_TOKEN:?MASTER_SESSION_TOKEN is required}

services:
  postgres:
    hostname: postgres
    container_name: ${APP_NAME:-stratflow}-db
    image: postgres:17-alpine
    restart: unless-stopped
    ports: []
    volumes:
      - app-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-change-me-postgres-password}
      POSTGRES_DB: ${DB_NAME:-stratflow}
    networks:
      - app-network

  identity:
    build:
      context: .
      dockerfile: ./deploy/docker/Dockerfile
      target: prod
      args:
        SERVICE: identity
    container_name: ${APP_NAME:-stratflow}-identity
    restart: unless-stopped
    depends_on:
      - postgres
    ports: []
    environment:
      <<: *identity-env
    networks:
      app-network:
        aliases:
          - identity

  strategy-registry:
    build:
      context: .
      dockerfile: ./deploy/docker/Dockerfile
      target: prod
      args:
        SERVICE: strategy-registry
    container_name: ${APP_NAME:-stratflow}-strategy-registry
    restart: unless-stopped
    depends_on:
      - postgres
      - identity
    ports: []
    environment:
      <<: *strategy-registry-env
    networks:
      app-network:
        aliases:
          - strategy-registry

  front:
    build:
      context: .
      dockerfile: ./deploy/front/Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8085/api}
    container_name: ${APP_NAME:-stratflow}-front
    restart: unless-stopped
    ports: []
    environment:
      APP_ENV: prod
      NODE_ENV: production
    networks:
      - app-network

  nginx:
    image: nginx:1.25-alpine
    container_name: ${APP_NAME:-stratflow}-nginx
    restart: unless-stopped
    depends_on:
      - identity
      - strategy-registry
    ports:
      - "${API_GATEWAY_PORT_HOST:-8085}:80"
    environment:
      NGINX_PROXY_INTERCEPT_ERRORS: ${NGINX_PROXY_INTERCEPT_ERRORS:-on}
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

volumes:
  app-data:

networks:
  app-network:
    driver: bridge
